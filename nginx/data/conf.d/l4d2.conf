# ============================================================
# l4d2.tunarund.top — 站点入口
# ============================================================

upstream php_backend     { server php:9000; }
upstream sidecar_backend { server sidecar:8080; }
upstream glances_backend { server glances:61208; }

# ---- HTTPS（推荐） ----
server {
    listen 443 ssl;
    http2 on;
    server_name l4d2.tunarund.top;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    include /etc/nginx/conf.d/common.inc;
}

# ---- HTTP（兼容 / 重定向到 HTTPS） ----
server {
    listen 80;
    server_name l4d2.tunarund.top;
    include /etc/nginx/conf.d/common.inc;
}

# ---- IP 直接访问 ----
server {
    listen 80 default_server;
    server_name _;
    include /etc/nginx/conf.d/common.inc;
}
