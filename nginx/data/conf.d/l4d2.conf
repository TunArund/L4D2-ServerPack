# ============================================================
# l4d2.tunarund.top — 主站点
# ============================================================

upstream php_backend {
    server php:9000;
}

upstream sidecar_backend {
    server sidecar:8080;
}

upstream glances_backend {
    server glances:61208;
}

server {
    listen 80;
    server_name l4d2.tunarund.top;

    root /var/www/html;
    index index.php;
    client_max_body_size 2048m;

    # ---- 第三方静态资源：长缓存 ----
    location ~* \.(jpg|jpeg|png|gif|webp|svg|woff|woff2|mp3|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    location ~* /static/(css|js|font)/bootstrap.*\.(css|js|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    location ~* /static/js/jquery.*\.js$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ---- 自定义 JS/CSS：短缓存 ----
    location ~* /static/js/custom/.*\.js$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }
    location ~* \.css$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }
    location ~* \.js$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ---- PHP → FastCGI ----
    location ~ \.php$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ---- /manage → sidecar ----
    location /manage/ {
        proxy_pass http://sidecar_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- /monitor-api → Glances REST API ----
    location /monitor-api/ {
        proxy_pass http://glances_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- / → 前端路由 fallback ----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}

# ============================================================
# IP 直接访问也转发到 PHP 应用（可选：改为 return 444 屏蔽）
# ============================================================
server {
    listen 80 default_server;
    server_name _;

    root /var/www/html;
    index index.php;

    location /manage/ {
        proxy_pass http://sidecar_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /monitor-api/ {
        proxy_pass http://glances_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}


