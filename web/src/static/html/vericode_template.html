<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    .card {
      max-width: 600px;
      margin: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      background-color: #ffffff;
      font-family: Arial, sans-serif;
    }
    .code-box {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 6px;
      text-align: center;
      color: #0d6efd;
      margin: 20px 0;
    }
    .footer {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body style="background-color:#f8f9fa; padding: 20px;">
  <div class="card">
    <h2 style="text-align:center; color:#0d6efd;">您的验证码</h2>
    <p>尊敬的用户，</p>
    <p>您正在尝试进行身份验证操作。以下是您的验证码</p>
    <div class="code-box">{{veri_code}}</div>
    <p>有效时长为<strong style="color:red;">{{valid_time_str}}分钟</strong>，有效期至{{expire_time_str}}请尽快使用。</p>
    <p>如非本人操作，请忽略此邮件或及时修改密码以保障账号安全。</p>
    
    <div class="footer">
      本邮件由系统自动发送，请勿直接回复。<br>
      &copy; 2025 {{company_name}}. All rights reserved.
    </div>
  </div>

</body>
</html>
