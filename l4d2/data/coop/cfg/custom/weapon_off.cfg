say 正在去除大枪
sm plugins load optional/l4d2_weaponrules.smx
say 将连喷替换为单喷
l4d2_addweaponrule shotgun_spas shotgun_chrome
l4d2_addweaponrule autoshotgun pumpshotgun
l4d2_addweaponrule grenade_launcher smg_silenced
say 将AK47、SCAR替换为消音smg
l4d2_addweaponrule rifle smg
l4d2_addweaponrule rifle_ak47 smg_silenced
l4d2_addweaponrule rifle_desert weapon_smg_mp5
l4d2_addweaponrule rifle_sg552 weapon_smg_mp5
l4d2_addweaponrule rifle_m60 smg_silenced
say 将大狙、连狙、鸟狙替换为喷子和消音smg
l4d2_addweaponrule sniper_military shotgun_chrome
l4d2_addweaponrule sniper_awp pumpshotgun
l4d2_addweaponrule sniper_scout smg
l4d2_addweaponrule hunting_rifle smg_silenced
