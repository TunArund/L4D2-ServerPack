say 恢复默认僵尸数量
//总数限制
sm_cvar z_common_limit                           30 
//生成数量
sm_cvar z_mob_spawn_finale_size                  20 //救援数量
sm_cvar z_mob_spawn_max_size                     30 //单次最大
sm_cvar z_mob_spawn_min_size                     10 //单次最小
//四种难度最大时间间隔
sm_cvar z_mob_spawn_max_interval_easy            240
sm_cvar z_mob_spawn_max_interval_normal          180
sm_cvar z_mob_spawn_max_interval_hard            180
sm_cvar z_mob_spawn_max_interval_expert          180
//四种难度最小生成时间间隔
sm_cvar z_mob_spawn_min_interval_easy            120
sm_cvar z_mob_spawn_min_interval_normal          90
sm_cvar z_mob_spawn_min_interval_hard            90
sm_cvar z_mob_spawn_min_interval_expert          90
//警报机关等恐慌事件
sm_cvar z_mega_mob_size                          50 //数量
sm_cvar z_mega_mob_spawn_max_interval            900 //最大时间间隔
sm_cvar z_mega_mob_spawn_min_interval            420 //最小时间间隔
//其他
sm_cvar z_wandering_density                      0.03 //游荡僵尸密度
sm_cvar z_background_limit                       30 //背景僵尸数量上限